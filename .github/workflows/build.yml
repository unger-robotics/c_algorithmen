# ju -- 2026 -- build.yml
# Baut alle Programme warnungsfrei (-Werror) mit gcc und clang und verifiziert
# Traces (JSON, Schema, Manifest, gen-traces) sowie die deterministische
# Terminal-Ausgabe (Golden-Tests).
name: build

on: [push, pull_request]

jobs:
  compile:
    name: compile (-Werror)
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cc: gcc
            cxx: g++
          - os: macos-latest
            cc: cc
            cxx: c++
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: ${{ matrix.cc }} --version && make --version | head -1
      - name: Alle Programme bauen (Warnungen sind Fehler)
        run: make all CC=${{ matrix.cc }} CXX=${{ matrix.cxx }} WARN="-Wall -Wextra -Wno-missing-field-initializers -Werror"

  verify:
    name: traces + golden
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bauen
        run: make all
      - name: Unit-Tests (Logik)
        run: make test
      - name: Traces erzeugen (jedes Programm muss sauber durchlaufen)
        run: make traces
      - name: Alle Traces sind gültiges JSON
        run: |
          for f in web/traces/*.json; do python3 -m json.tool "$f" > /dev/null; done
      - name: Trace-Schema, Manifest und gen-traces-Vollständigkeit
        run: python3 tools/check-traces.py
      - name: Golden-Tests (deterministische Terminal-Ausgaben)
        run: sh tools/check-golden.sh
      # Die deterministischen Traces müssen byte-identisch zum eingecheckten Stand
      # sein. Ausnahme: mitZuruecklegen.json (Lotto) nutzt rand() — je libc andere
      # Folge; oben bereits auf JSON/Schema geprüft.
      - name: Demo-Traces sind in sync mit dem Quellcode
        run: git diff --exit-code -- web/traces ':(exclude)web/traces/mitZuruecklegen.json'
