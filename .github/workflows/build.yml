# ju -- 2026 -- build.yml
# CI: baut alle Programme (Linux + macOS) und prueft, dass die eingecheckten
# Demo-Traces noch zum Quellcode passen. Kein WebAssembly, kein Frontend-Build.
name: build

on: [push, pull_request]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain anzeigen
        run: cc --version && make --version | head -1

      - name: Alle Programme bauen
        run: make all

      - name: Traces erzeugen (jedes Programm muss sauber durchlaufen)
        run: make traces

      - name: Alle Traces sind gültiges JSON
        run: |
          for f in web/traces/*.json; do python3 -m json.tool "$f" > /dev/null; done

      # Die deterministischen Traces müssen byte-identisch zum eingecheckten Stand
      # sein. Ausnahme: mitZuruecklegen.json (Lotto) nutzt rand() — das liefert je
      # C-Standardbibliothek (glibc vs. BSD libc) trotz festem Seed andere Folgen;
      # dieser Trace wird oben nur auf JSON-Gültigkeit geprüft. Diff auf einer
      # Plattform genügt, da die anderen Traces nur ganzzahlige Werte enthalten.
      - name: Demo-Traces sind in sync mit dem Quellcode
        if: matrix.os == 'ubuntu-latest'
        run: git diff --exit-code -- web/traces ':(exclude)web/traces/mitZuruecklegen.json'
